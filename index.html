<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEAL Team Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111E;--surf:#0D1B2A;--surf2:#122236;
  --border:#1C3050;--border2:#253F60;
  --text:#E8F0FF;--text2:#7A9ABB;--text3:#3D5470;
  --gold:#F5B500;--gold-glow:rgba(245,181,0,.2);
  --silver:#A0B4CC;--bronze:#C07840;
  --t1:#4AA0F0;--t1d:#0D3060;
  --t2:#F5A030;--t2d:#3A2008;
  --t3:#00CC96;--t3d:#003828;
  --neg:#FF6060;--pos:#00CC96;
  --r:10px;--r-sm:6px;
  --sans:'DM Sans',system-ui,sans-serif;
  --cond:'Barlow Condensed',system-ui,sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px}
.wrap{max-width:980px;margin:0 auto;padding:0 18px 60px}

/* ── header ─── */
.hdr{background:linear-gradient(180deg,#0A1828,#060F1C);border-bottom:1px solid var(--border);margin-bottom:24px}
.hdr-in{max-width:980px;margin:0 auto;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-icon{width:42px;height:42px;background:var(--surf2);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr-t{font-family:var(--cond);font-size:23px;font-weight:800;letter-spacing:.04em;line-height:1}
.hdr-s{font-size:12px;color:var(--text3);margin-top:2px}
.pbadge{background:var(--gold);color:#000;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.06em;font-family:var(--cond)}
.ptag{font-size:11px;color:var(--text3);margin-top:4px;text-align:right}

/* ── corner drop widget ─────────────────────────────────────────────────── */
#cdrop{
  position:fixed;
  top:14px;left:14px;
  z-index:999;
  width:34px;height:34px;
  border-radius:8px;
  background:rgba(9,20,35,.88);
  border:1px solid var(--border2);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  cursor:pointer;
  transition:width .22s ease,border-color .15s,background .15s,box-shadow .15s;
  overflow:hidden;
  display:flex;align-items:center;
  white-space:nowrap;
}
#cdrop:hover,#cdrop.drag{
  width:172px;
  border-color:var(--t1);
  background:rgba(12,30,60,.92);
  box-shadow:0 0 0 3px rgba(74,160,240,.12);
}
#cdrop.drag{ border-color:var(--pos); box-shadow:0 0 0 3px rgba(0,204,150,.15); }
#cdrop.loaded{ border-color:var(--pos); }
#cdrop.err   { border-color:var(--neg); }

.cd-icon{
  width:34px;height:34px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
}
.cd-label{
  font-size:12px;font-weight:600;color:var(--text2);
  padding-right:12px;letter-spacing:.01em;
}
/* status dot */
.cd-dot{
  position:absolute;top:6px;right:6px;
  width:7px;height:7px;border-radius:50%;
  display:none;
}
#cdrop.loaded .cd-dot{ display:block; background:var(--pos); }
#cdrop.err    .cd-dot{ display:block; background:var(--neg); }

/* ── toast ─────────────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:998;
  background:var(--surf2);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:10px 18px;
  font-size:13px;color:var(--text2);
  opacity:0;pointer-events:none;
  transition:opacity .25s;
  max-width:440px;text-align:center;line-height:1.4;
  backdrop-filter:blur(8px);
}
#toast.show{opacity:1}
#toast.ok { border-color:var(--pos); color:#5ADDB8; }
#toast.err{ border-color:var(--neg); color:#FF9090; }

/* ── kpi ─── */
.kpi-bar{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
.kb{padding:9px 22px;border:1px solid var(--border2);background:var(--surf);color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.05em;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;text-transform:uppercase}
.kb:hover{color:var(--text);background:var(--surf2)}
.kb.a-ns{background:var(--t1d);border-color:var(--t1);color:var(--t1)}
.kb.a-cr{background:var(--t2d);border-color:var(--t2);color:var(--t2)}
.kb.a-al{background:var(--t3d);border-color:var(--t3);color:var(--t3)}

/* ── section label ─── */
.sec{font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--text3);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── podium ─── */
.pod-wrap{display:flex;align-items:flex-end;justify-content:center;gap:6px;margin-bottom:34px;min-height:250px}
.pod-col{display:flex;flex-direction:column;align-items:center;flex:1;max-width:210px;opacity:0;animation:up .4s ease forwards}
.pod-col:nth-child(1){animation-delay:.12s}.pod-col:nth-child(2){animation-delay:.04s}.pod-col:nth-child(3){animation-delay:.2s}
.pod-info{text-align:center;padding:0 8px 10px;width:100%}
.pod-crown{font-size:24px;margin-bottom:4px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.pod-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--cond);font-size:17px;font-weight:700;margin:0 auto 8px;border:2px solid transparent}
.p1 .pod-av{width:62px;height:62px;font-size:20px}
.pod-nm{font-family:var(--cond);font-size:15px;font-weight:700;color:var(--text)}
.pod-tm{font-size:11px;margin-top:2px}
.pod-val{font-family:var(--cond);font-size:20px;font-weight:800;margin-top:5px;line-height:1}
.p1 .pod-val{font-size:26px}
.pod-blk{width:100%;display:flex;align-items:center;justify-content:center;border-radius:6px 6px 0 0}
.pod-blk span{font-family:var(--cond);font-size:30px;font-weight:800;opacity:.6}
.p1 .pod-blk{background:linear-gradient(180deg,#2E2200,#181100);border:1px solid #4A3800;border-bottom:none}
.p1 .pod-blk span,.p1 .pod-val{color:var(--gold)}
.p2 .pod-blk{background:linear-gradient(180deg,#1A2330,#101820);border:1px solid #283848;border-bottom:none}
.p2 .pod-blk span,.p2 .pod-val{color:var(--silver)}
.p3 .pod-blk{background:linear-gradient(180deg,#281A0C,#180F06);border:1px solid #382818;border-bottom:none}
.p3 .pod-blk span,.p3 .pod-val{color:var(--bronze)}
.pod-base{height:5px;background:var(--border);border-radius:0 0 4px 4px;width:calc(100% + 2px);margin:0 -1px}

/* ── board ─── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .15s;opacity:0;animation:up .3s ease forwards}
.card:nth-child(1){animation-delay:.06s}.card:nth-child(2){animation-delay:.11s}.card:nth-child(3){animation-delay:.16s}
.card.c1{animation:up .3s ease .06s forwards,glow 3s ease-in-out 1.5s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 18px 3px var(--gold-glow)}}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--border2)}.card.open{border-color:var(--border2)}
.trow{display:grid;grid-template-columns:52px 54px 1fr 104px 160px 34px;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;user-select:none}
@media(max-width:620px){.trow{grid-template-columns:40px 46px 1fr 80px 32px;gap:10px;padding:12px 14px}.bcol{display:none}}
.rk{font-family:var(--cond);font-size:34px;font-weight:800;text-align:center;line-height:1}
.rk.r1{color:var(--gold);text-shadow:0 0 18px var(--gold-glow)}.rk.r2{color:var(--silver)}.rk.r3{color:var(--bronze)}
.av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--cond);font-size:15px;font-weight:700;border:2px solid transparent}
.tlnm{font-size:15px;font-weight:600}.tltm{font-size:12px;margin-top:1px}
.kval{text-align:right}.kvn{font-family:var(--cond);font-size:24px;font-weight:700;line-height:1}.kvl{font-size:11px;color:var(--text3);margin-top:2px}
.bcol{display:flex;flex-direction:column;gap:5px}
.btrk{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bfil{height:100%;border-radius:3px;transition:width .55s cubic-bezier(.4,0,.2,1)}
.bmeta{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.chv{color:var(--text3);font-size:22px;transition:transform .2s;text-align:center;line-height:1}
.card.open .chv{transform:rotate(180deg)}
.bdg{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px;letter-spacing:.04em;vertical-align:middle;font-family:var(--cond)}
.fire{background:rgba(255,120,0,.15);color:#FF9030;border:1px solid rgba(255,120,0,.3)}
.gold-bdg{background:var(--gold-glow);color:var(--gold);border:1px solid rgba(245,181,0,.3)}

/* ── rep rows ─── */
.reps{display:none;border-top:1px solid var(--border)}
.reps.open{display:block}
.rh{display:grid;grid-template-columns:1fr 90px 120px;gap:8px;padding:8px 16px 6px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;background:var(--surf2)}
.rh span:nth-child(2){text-align:right}
.rr{display:grid;grid-template-columns:1fr 90px 120px;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid var(--border)}
.rr:hover{background:var(--surf2)}
.rnm{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rv{font-size:13px;font-weight:600;text-align:right;white-space:nowrap}
.rbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.rbfil{height:100%;border-radius:2px;transition:width .4s ease}
.avgr{background:var(--surf2)}.avgr .rnm{color:var(--text2);font-style:italic}.avgr .rv{color:var(--text2)}
.vnull{color:var(--text3)}.vneg{color:var(--neg)}

/* ── waiting state ─── */
.waiting{padding:80px 24px;text-align:center}
.waiting-icon{font-size:48px;margin-bottom:16px;opacity:.3;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.55}}
.waiting-t{font-size:17px;font-weight:600;color:var(--text3);margin-bottom:6px}
.waiting-s{font-size:13px;color:var(--text3)}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<!-- ── Corner drop widget ───────────────────────────────────────────────── -->
<div id="cdrop" title="Drop Excel file or click to browse">
  <div class="cd-icon" id="cd-icon">&#9729;</div>
  <div class="cd-label" id="cd-label">Drop file to update</div>
  <div class="cd-dot"></div>
</div>
<input type="file" id="fi" accept=".xlsx,.xls,.csv" style="display:none">

<!-- ── Toast ──────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-in">
    <div class="hdr-brand">
      <div class="hdr-icon">&#127697;</div>
      <div>
        <div class="hdr-t">SEAL Team Leaderboard</div>
        <div class="hdr-s">Sales Execution &amp; Advancement Leadership</div>
      </div>
    </div>
    <div style="text-align:right">
      <div class="pbadge" id="pbadge">Loading&hellip;</div>
      <div class="ptag"   id="ptag">&nbsp;</div>
    </div>
  </div>
</header>

<!-- ── Main content ───────────────────────────────────────────────────── -->
<div class="wrap">

  <div id="waiting" class="waiting">
    <div class="waiting-icon">&#128202;</div>
    <div class="waiting-t">Fetching latest data&hellip;</div>
    <div class="waiting-s">If this takes a moment, hover the cloud icon in the top-left to drop your file manually</div>
  </div>

  <div id="main" style="display:none">
    <div class="kpi-bar">
      <button class="kb a-ns" id="btn-ns" onclick="setKpi('netSales')">&#128176; Net Sales</button>
      <button class="kb"      id="btn-cr" onclick="setKpi('closeRate')">&#127919; Close %</button>
      <button class="kb"      id="btn-al" onclick="setKpi('adl')">&#128200; ADL</button>
    </div>
    <div class="sec">Team Lead Rankings</div>
    <div class="pod-wrap" id="pod"></div>
    <div class="sec">Full Standings</div>
    <div id="board"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── Roster ────────────────────────────────────────────────────────────────
const ROSTER = {
  "mike tigges":      {team:1,role:'tl'},  "george heller":    {team:2,role:'tl'},
  "nick dormitorio":  {team:3,role:'tl'},  "michael bobak":    {team:1,role:'rep'},
  "don baier":        {team:1,role:'rep'}, "david pate":       {team:1,role:'rep'},
  "josh larson":      {team:1,role:'rep'}, "gregory kentra":   {team:1,role:'rep'},
  "stephen petersen": {team:2,role:'rep'}, "jeff sullivan":    {team:2,role:'rep'},
  "jesse xidis":      {team:2,role:'rep'}, "brian schweihs":   {team:2,role:'rep'},
  "michael scardino": {team:2,role:'rep'}, "walter hollister": {team:3,role:'rep'},
  "paul grossman":    {team:3,role:'rep'}, "anthony decker":   {team:3,role:'rep'},
  "omar pena":        {team:3,role:'rep'}, "zachary klein":    {team:3,role:'rep'},
};
const TC   = {1:{name:'SEAL Team 1',c:'#4AA0F0',d:'#0D3060'},2:{name:'SEAL Team 2',c:'#F5A030',d:'#3A2008'},3:{name:'SEAL Team 3',c:'#00CC96',d:'#003828'}};
const RC   = ['#F5B500','#A0B4CC','#C07840'];
const RCLS = ['r1','r2','r3'];
let gData=null,kpi='netSales',exp={};

// ── Corner widget ─────────────────────────────────────────────────────────
const cdrop = document.getElementById('cdrop');
const fi    = document.getElementById('fi');

cdrop.addEventListener('click', () => fi.click());
fi.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

// Drag events land on the corner widget itself
cdrop.addEventListener('dragenter', e => { e.preventDefault(); cdrop.classList.add('drag'); });
cdrop.addEventListener('dragover',  e => { e.preventDefault(); cdrop.classList.add('drag'); });
cdrop.addEventListener('dragleave', e => { if (!cdrop.contains(e.relatedTarget)) cdrop.classList.remove('drag'); });
cdrop.addEventListener('drop', e => {
  e.preventDefault();
  cdrop.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) processFile(f);
});

// Also accept drops anywhere on the page body as a convenience
document.body.addEventListener('dragover',  e => { e.preventDefault(); cdrop.classList.add('drag'); });
document.body.addEventListener('dragleave', e => { if (e.relatedTarget===null) cdrop.classList.remove('drag'); });
document.body.addEventListener('drop', e => {
  e.preventDefault();
  cdrop.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) processFile(f);
});

function setCorner(state) {
  cdrop.classList.remove('loaded','err','drag');
  document.getElementById('cd-icon').innerHTML  = state==='loaded' ? '&#9989;' : state==='err' ? '&#10060;' : '&#9729;';
  document.getElementById('cd-label').textContent = state==='loaded' ? 'Data loaded — drop to refresh' : state==='err' ? 'Load failed — try again' : 'Drop file to update';
  if (state==='loaded'||state==='err') cdrop.classList.add(state);
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type='', duration=4000) {
  const el = document.getElementById('toast');
  el.className = 'show' + (type ? ' '+type : '');
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, duration);
}

// ── Boot: auto-fetch from repo ────────────────────────────────────────────
const AUTO_FILES = ['leaderboard_data_template.xlsx','data.xlsx','data.csv'];

async function boot() {
  for (let i=0; i<20; i++) { if (window.XLSX) break; await delay(150); }
  if (!window.XLSX) {
    setWaiting('Could not load the spreadsheet library. Check your internet connection and reload.');
    setCorner('err');
    return;
  }
  for (const fname of AUTO_FILES) {
    try {
      const resp = await fetch('./'+fname+'?t='+Date.now());
      if (!resp.ok) continue;
      const buf  = await resp.arrayBuffer();
      const wb   = XLSX.read(buf, {type:'array'});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (rows.length) { buildAndRender(rows, fname, true); return; }
    } catch(e) { continue; }
  }
  // Nothing found on server — show idle state
  setWaiting(null);
  setCorner('');
  document.getElementById('pbadge').textContent = 'No data';
  document.getElementById('ptag').textContent   = '';
}

function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

function setWaiting(msg) {
  const el = document.getElementById('waiting');
  el.style.display = 'block';
  document.getElementById('main').style.display = 'none';
  if (msg) {
    el.querySelector('.waiting-t').textContent = 'Could not load data';
    el.querySelector('.waiting-s').textContent = msg;
  } else {
    el.querySelector('.waiting-t').textContent = 'Waiting for data';
    el.querySelector('.waiting-s').textContent = 'Hover the cloud \u2601 in the top-left corner and drop your Excel file';
    el.querySelector('.waiting-icon').textContent = '\u2601';
  }
}

// ── File processor ────────────────────────────────────────────────────────
function processFile(file) {
  toast('Reading ' + file.name + '…', '', 9999);
  if (!window.XLSX) { toast('SheetJS not loaded — reload the page.','err'); setCorner('err'); return; }
  const reader = new FileReader();
  reader.onerror = () => { toast('Could not read file.','err'); setCorner('err'); };
  reader.onload  = e => {
    try {
      const ext  = file.name.split('.').pop().toLowerCase();
      const wb   = XLSX.read(e.target.result, {type: ext==='csv'?'binary':'array'});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!rows.length) { toast('File appears empty.','err'); setCorner('err'); return; }
      buildAndRender(rows, file.name, false);
    } catch(err) { toast('Parse error: '+err.message,'err'); setCorner('err'); }
  };
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext==='csv') reader.readAsBinaryString(file);
  else             reader.readAsArrayBuffer(file);
}

// ── Build ─────────────────────────────────────────────────────────────────
function buildAndRender(rows, fname, fromRepo) {
  const headers   = Object.keys(rows[0]);
  const nameCol   = headers[0];
  const norm      = k => String(k).toLowerCase().replace(/[^a-z0-9]/g,'');
  const closeCol  = headers.find(h=>norm(h).includes('close'))  || headers[1];
  const nsCol     = headers.find(h=>norm(h).includes('net')||norm(h)==='netsales') || headers[2];
  const adlCol    = headers.find(h=>norm(h)==='adl')            || headers[3];

  const T = {1:{id:1,tl:null,members:[]},2:{id:2,tl:null,members:[]},3:{id:3,tl:null,members:[]}};
  let matched=0;

  rows.forEach(row => {
    const name = String(row[nameCol]||'').trim();
    if (!name) return;
    const entry = ROSTER[name.toLowerCase()];
    if (!entry) return;
    let cr = parseFloat(row[closeCol]);
    if (isNaN(cr)) cr=null; else if (cr>1.5) cr=cr/100;
    const person = {name, closeRate:cr, netSales:numOrNull(row[nsCol]), adl:numOrNull(row[adlCol])};
    if (entry.role==='tl') T[entry.team].tl=person; else T[entry.team].members.push(person);
    matched++;
  });

  const teams = Object.values(T).filter(t=>t.tl);
  if (!teams.length) {
    toast('No matching names found. Check the file format.','err',6000);
    setCorner('err');
    setWaiting('Names in the file didn\'t match the roster. Hover the cloud icon and drop your leaderboard_data_template.xlsx file.');
    return;
  }

  gData = {teams, loaded:new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})};
  setCorner('loaded');
  const src = fromRepo ? 'Auto-loaded from GitHub' : 'Loaded from file';
  toast(src + ' \u2014 ' + matched + ' records', 'ok');
  document.getElementById('pbadge').textContent = fromRepo ? 'Live' : 'Manual';
  document.getElementById('ptag').textContent   = 'Updated ' + gData.loaded;
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('main').style.display    = 'block';
  setKpi('netSales');
}

function numOrNull(v){
  if(v===null||v===undefined||v==='')return null;
  const x=parseFloat(String(v).replace(/[$,\s]/g,''));
  return isNaN(x)?null:x;
}

// ── KPI ───────────────────────────────────────────────────────────────────
function setKpi(k){
  kpi=k;
  document.getElementById('btn-ns').className='kb'+(k==='netSales' ?' a-ns':'');
  document.getElementById('btn-cr').className='kb'+(k==='closeRate'?' a-cr':'');
  document.getElementById('btn-al').className='kb'+(k==='adl'      ?' a-al':'');
  render();
}
function getV(p){return kpi==='netSales'?p.netSales:kpi==='closeRate'?p.closeRate:p.adl}
function fmt(v,compact){
  if(v===null||v===undefined)return'\u2014';
  if(kpi==='closeRate')return(v*100).toFixed(1)+'%';
  const abs=Math.abs(v),neg=v<0;
  if(compact&&abs>=1000)return(neg?'-$':'$')+(abs/1000).toFixed(1)+'k';
  return(neg?'-$':'$')+abs.toLocaleString('en-US',{maximumFractionDigits:0});
}
function ini(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}

// Average KPI across ALL team members including the TL — used for ranking
function teamKpi(team){
  const all=[team.tl,...team.members];
  const vals=all.map(p=>getV(p)).filter(v=>v!==null&&v!==undefined);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}
// Average KPI for reps only — used in expanded rep section footer
function repAvg(members){
  const vals=members.map(p=>getV(p)).filter(v=>v!==null);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  if(!gData)return;
  // Sort and display by team average (TL + all reps)
  const sorted=[...gData.teams].sort((a,b)=>(teamKpi(b)??-Infinity)-(teamKpi(a)??-Infinity));
  const maxAvg=Math.max(...sorted.map(t=>teamKpi(t)??0),1);
  renderPod(sorted,maxAvg); renderBoard(sorted,maxAvg);
}

function renderPod(s,maxAvg){
  const slots=[s[1],s[0],s[2]],pc=['p2','p1','p3'],ri=[1,0,2],hts=[88,132,56];
  document.getElementById('pod').innerHTML=slots.map((t,si)=>{
    if(!t)return'';
    const cfg=TC[t.id]||TC[1],val=teamKpi(t);
    return`<div class="pod-col ${pc[si]}">
      <div class="pod-info">
        ${ri[si]===0?'<div class="pod-crown">&#128081;</div>':''}
        <div class="pod-av" style="background:${cfg.d};border-color:${cfg.c};color:${cfg.c}">${ini(t.tl.name)}</div>
        <div class="pod-nm">${t.tl.name}${ri[si]===0?' &#128293;':''}</div>
        <div class="pod-tm" style="color:${cfg.c}">${cfg.name}</div>
        <div class="pod-val">${fmt(val)}</div>
        <div style="font-size:10px;color:${cfg.c};margin-top:3px;opacity:.7">team avg</div>
      </div>
      <div class="pod-blk" style="height:${hts[si]}px"><span>${ri[si]+1}</span></div>
      <div class="pod-base"></div>
    </div>`;
  }).join('');
}

function renderBoard(sorted,maxAvg){
  const allPeople=gData.teams.flatMap(t=>[t.tl,...t.members]);
  const maxInd=Math.max(...allPeople.map(p=>getV(p)).filter(v=>v!=null&&v>0),1);
  const kl=kpi==='netSales'?'Net Sales':kpi==='closeRate'?'Close %':'ADL';
  document.getElementById('board').innerHTML=sorted.map((team,ri)=>{
    const val=teamKpi(team),pct=Math.max(0,((val??0)/maxAvg)*100);
    const cfg=TC[team.id]||TC[1],isOpen=!!exp[team.id];
    // Rep section: TL row first, then reps sorted by individual KPI
    const sortedMem=[...team.members].sort((a,b)=>(getV(b)??-Infinity)-(getV(a)??-Infinity));
    const allRows=[team.tl,...sortedMem].map((p,pi)=>{
      const mv=getV(p),mpct=mv!=null&&mv>0?Math.min(100,(mv/maxInd)*100):0,neg=mv!==null&&mv<0;
      const isTL=pi===0;
      return`<div class="rr${isTL?' avgr':''}">
        <div class="rnm">${p.name}${isTL?' <span style="font-size:10px;opacity:.6">(TL)</span>':''}</div>
        <div class="rv ${mv===null?'vnull':neg?'vneg':''}">${fmt(mv)}</div>
        <div class="rbar"><div class="rbfil" style="width:${mpct}%;background:${neg?'#FF6060':cfg.c}"></div></div>
      </div>`;
    }).join('');
    const avg=repAvg(team.members);
    const avgRow=avg!==null?`<div class="rr" style="background:rgba(255,255,255,.03)">
      <div class="rnm" style="color:var(--text3);font-style:italic">Team avg (all)</div>
      <div class="rv" style="color:var(--text3)">${fmt(val)}</div><div></div>
    </div>`:'';
    return`<div class="card${isOpen?' open':''}${ri===0?' c1':''}" id="card-${team.id}">
      <div class="trow" onclick="toggle(${team.id})">
        <div class="rk ${RCLS[ri]}">${ri+1}</div>
        <div class="av" style="background:${cfg.d};border-color:${cfg.c};color:${cfg.c}">${ini(team.tl.name)}</div>
        <div>
          <div class="tlnm">${team.tl.name}${ri===0?'<span class="bdg gold-bdg">&#128081; #1</span>':''}${ri===0?'<span class="bdg fire">&#128293; LEADER</span>':''}</div>
          <div class="tltm" style="color:${cfg.c}">${cfg.name} &bull; ${team.members.length} reps</div>
        </div>
        <div class="kval">
          <div class="kvn" style="color:${RC[ri]}">${fmt(val,true)}</div>
          <div class="kvl">Team avg ${kl}</div>
        </div>
        <div class="bcol">
          <div class="btrk"><div class="bfil" style="width:${pct}%;background:${cfg.c}"></div></div>
          <div class="bmeta"><span>${team.members.length} reps</span><span>${Math.round(pct)}% of leader</span></div>
        </div>
        <div class="chv">&#8964;</div>
      </div>
      <div class="reps${isOpen?' open':''}" id="rep-${team.id}">
        <div class="rh"><span>Member</span><span>${kl}</span><span></span></div>
        ${allRows}${avgRow}
      </div>
    </div>`;
  }).join('');
}

function toggle(id){
  exp[id]=!exp[id];
  document.getElementById('card-'+id)?.classList.toggle('open',exp[id]);
  document.getElementById('rep-'+id)?.classList.toggle('open',exp[id]);
}

boot();
</script>
</body>
</html>
